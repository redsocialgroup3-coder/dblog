services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dblog-net

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dblog}
      POSTGRES_USER: ${POSTGRES_USER:-dblog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dblog}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dblog}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dblog-net

volumes:
  pgdata:

networks:
  dblog-net:
    driver: bridge
